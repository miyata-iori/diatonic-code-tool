<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダイアトニックコード進行支援ツール</title>
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>

<body>
<div class="card">
<h1>使い方</h1>
<ol>
    <li>キーとメジャー/マイナーを選択する</li>
    <li>ダイアトニックコードが表示される</li>
    <li>コードをクリックするとおすすめを表示する</li>
</ol>
</div>

<div class="card">
<h3>キー＆調性の選択</h3>

<div class="row-control">
<div class="control">
<label>キー</label>
<select class="major" id="keySelect"></select>
</div>

<div class="control">
<label>調性</label>
<button id="mode-btn" class="button major">Major</button>
</div>

<div class="control">
<h3>現在のスケール</h3>
<h1 id="scale"></h1>
</div>
</div>
</div>


<div class="card">
<h2>ダイアトニックコード</h2>
<div id="dCode"></div>
</div>

<!--おすすめダイアトニックコードを表示する場所-->
<div id="recommendBubble" class="recommend-bubble"></div>

</body>
</html>
